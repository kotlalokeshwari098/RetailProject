<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="left-side">
            <h2 class="logo">Your Logo</h2>
            <img src="scooter-guy.png" alt="Scooter Illustration" class="illustration">
        </div>
        <div class="right-side">
            <img src="floating-girl.png" alt="Floating Girl Illustration" class="illustration">
        </div>
        <div class="form-container">
            <h3>Welcome to Lorem</h3>
            <h1>Sign up</h1>
            <p>Enter your username or email address</p>
            <input type="text" placeholder="Username or email address" class="input-field">
            
            <div class="row">
                <input type="text" placeholder="User name" class="input-field">
                <input type="text" placeholder="Contact Number" class="input-field">
            </div>
            
            <p>Enter your Password</p>
            <input type="password" placeholder="Password" class="input-field">
            
            <button class="signup-btn">Sign up</button>
            <p class="signin-text">Have an Account? <a href="#">Sign in</a></p>
        </div>
    </div>
</body>
</html>
