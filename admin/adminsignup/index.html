<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stockify - Sign In</title>
    <link rel="stylesheet" href="design.css">
</head>
<body>
    <div class="container">
        <div class="left-section">
            <div class="logo">Your Logo</div>
            <div class="illustration">
                <img src="scooter-illustration.png" alt="Person riding a scooter">
            </div>
        </div>
        <div class="right-section">
            <div class="form-container">
                <!-- <h1>Welcome to Stockify</h1> -->
                <h2>Sign Up</h2>
                <form>
                    <label for="username">Enter your username or email address</label>
                    <input type="text" id="username" name="username" placeholder="Username or email address">

                    <label for="username">User name</label>
                <input type="text" id="username" placeholder="User name" required>
                
                <label for="contact">Contact Number</label>
                <input type="text" id="contact" placeholder="Contact Number" required>



                    <label for="password">Enter your Password</label>
                    <input type="password" id="password" name="password" placeholder="Password">
                    
                    <div class="forgot-password">
                        <a href="#">Forgot Password</a>
                    </div>
                    
                    <button type="submit">Sign Up</button>
                </form>
                <div class="or">OR</div>
                <div class="social-login">
                    <button class="google">Sign in with Google</button>
                    <button class="facebook">
                        <img src="Facebook.png" alt="">
                    </button>
                    <button class="apple"></button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
